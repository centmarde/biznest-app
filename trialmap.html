<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PH Barangay Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }
    #panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: white;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="panel">
  <label for="citySelect">Select City/Municipality</label>
  <select id="citySelect">
    <option value="">Select City/Municipality</option>
  </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([8.95, 125.54], 10);

// base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let barangayLayer;

// 1️⃣ LOAD ALL CITIES FOR DROPDOWN
async function loadCities() {
  const url = "https://portal.georisk.gov.ph/arcgis/rest/services/PSA/Barangay/MapServer/4/query?where=1=1&outFields=city_name&returnDistinctValues=true&returnGeometry=false&f=json";

  const res = await fetch(url);
  const data = await res.json();

  const select = document.getElementById("citySelect");

  data.features.forEach(f => {
    const name = f.attributes.city_name;

    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;

    select.appendChild(option);
  });
}

// 2️⃣ LOAD BOUNDARIES WHEN CITY IS SELECTED
async function loadBarangays(city) {
  if (!city) return;

  const url = `https://portal.georisk.gov.ph/arcgis/rest/services/PSA/Barangay/MapServer/4/query?where=city_name='${city}'&outFields=*&f=geojson`;

  const res = await fetch(url);
  const geojson = await res.json();

  // remove old layer
  if (barangayLayer) {
    map.removeLayer(barangayLayer);
  }

  // add new layer
  barangayLayer = L.geoJSON(geojson, {
    style: {
      color: "blue",
      weight: 1,
      fillOpacity: 0.1
    },
    onEachFeature: (feature, layer) => {
      layer.bindPopup(feature.properties.brgy_name || "Barangay");
    }
  }).addTo(map);

  // zoom to result
  map.fitBounds(barangayLayer.getBounds());
}

// events
document.getElementById("citySelect").addEventListener("change", (e) => {
  loadBarangays(e.target.value);
});

// init
loadCities();
</script>

</body>
</html>
